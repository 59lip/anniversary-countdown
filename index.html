<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>&#32426;&#24565;&#26085;&#20498;&#35745;&#26102;</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#172033;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}main{width:min(1100px,calc(100% - 28px));margin:auto;padding:28px 0}header{display:flex;gap:16px;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;margin-bottom:18px}h1{margin:0 0 6px;font-size:clamp(30px,5vw,46px)}p{margin:0;color:#647084}.grid{display:grid;grid-template-columns:360px 1fr;gap:18px}.panel,.share{background:white;border:1px solid #dbe2ee;border-radius:8px;box-shadow:0 18px 45px rgba(23,32,51,.1);padding:18px}.share{display:none;margin-bottom:16px}.share.on{display:block}h2{margin:0 0 14px;font-size:19px}label{display:grid;gap:6px;margin-bottom:12px;font-size:14px;color:#334155}input,select,textarea,button{font:inherit}input,select,textarea{width:100%;border:1px solid #dbe2ee;border-radius:8px;padding:10px;min-height:40px}textarea{min-height:76px;resize:vertical}button{border:0;border-radius:8px;padding:10px 14px;min-height:40px;background:#2563eb;color:white;cursor:pointer}.secondary{background:#e8eefc;color:#1d4ed8}.ghost{background:white;color:#2563eb;border:1px solid #dbe2ee}.danger{background:#fee4e2;color:#b42318}.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.sync{border-top:1px solid #dbe2ee;margin-top:14px;padding-top:14px}.status{font-size:14px;color:#647084;min-height:24px}.ok{color:#15803d}.warn{color:#b45309}.error{color:#b42318}.events{display:grid;gap:12px}.event{display:grid;grid-template-columns:1fr auto;gap:12px;border:1px solid #dbe2ee;border-radius:8px;padding:14px}.event h3{margin:0 0 6px;font-size:18px;overflow-wrap:anywhere}.meta{display:flex;gap:12px;flex-wrap:wrap;color:#647084;font-size:14px}.note{margin-top:10px;color:#334155;overflow-wrap:anywhere}.count{min-width:118px;border-radius:8px;padding:10px;text-align:center;background:#eff6ff;color:#1d4ed8;font-weight:700}.today{background:#ecfdf3;color:#15803d}.past{background:#f8fafc;color:#475569}.empty{text-align:center;border:1px dashed #dbe2ee;border-radius:8px;padding:34px;color:#647084}.small{font-size:13px;line-height:1.5;color:#647084}@media(max-width:840px){main{width:calc(100% - 20px);padding:20px 0}.grid,.event{grid-template-columns:1fr}.count{width:100%}}
</style>
</head>
<body>
<main>
<header><div><h1>&#32426;&#24565;&#26085;&#20498;&#35745;&#26102;</h1><p>&#35760;&#24405;&#32426;&#24565;&#26085;&#12289;&#29983;&#26085;&#12289;&#32771;&#35797;&#12289;&#26053;&#34892;&#21644;&#20219;&#20309;&#20540;&#24471;&#25552;&#21069;&#35760;&#20303;&#30340;&#26085;&#23376;&#12290;</p></div><div class="actions"><button id="share" class="secondary" type="button">&#29983;&#25104;&#21516;&#27493;&#38142;&#25509;</button><button id="export" class="ghost" type="button">&#23548;&#20986; JSON</button><input id="importFile" type="file" accept="application/json" hidden><button id="importBtn" class="ghost" type="button">&#23548;&#20837; JSON</button></div></header>
<section id="shareBox" class="share"><label>&#21457;&#32473;&#25163;&#26426;&#30340;&#21516;&#27493;&#38142;&#25509;<input id="shareLink" readonly></label><p class="small">&#25163;&#26426;&#25171;&#24320;&#36825;&#20010;&#38142;&#25509;&#21518;&#65292;&#22635;&#21516;&#19968;&#20010; Supabase URL &#21644; publishable key&#65292;&#28857;&#8220;&#20445;&#23384;&#37197;&#32622;&#24182;&#21516;&#27493;&#8221;&#12290;</p></section>
<section class="grid"><aside class="panel"><h2>&#28155;&#21152;&#37325;&#35201;&#26085;&#26399;</h2><form id="form"><input id="eventId" type="hidden"><label>&#26631;&#39064;<input id="title" required maxlength="80" placeholder="&#20363;&#22914;&#65306;&#30456;&#35782;&#32426;&#24565;&#26085;"></label><label>&#26085;&#26399;<input id="date" required type="date"></label><label>&#20998;&#31867;<select id="category"><option value="anniversary">&#32426;&#24565;&#26085;</option><option value="birthday">&#29983;&#26085;</option><option value="exam">&#32771;&#35797;</option><option value="travel">&#26053;&#34892;</option><option value="work">&#24037;&#20316;</option><option value="custom">&#20854;&#20182;</option></select></label><label>&#22791;&#27880;<textarea id="note" maxlength="240" placeholder="&#31036;&#29289;&#12289;&#22320;&#28857;&#12289;&#20934;&#22791;&#20107;&#39033;"></textarea></label><div class="actions"><button id="save" type="submit">&#20445;&#23384;</button><button id="clear" class="ghost" type="button">&#28165;&#31354;</button></div></form><div class="sync"><h2>&#20113;&#31471;&#21516;&#27493;</h2><label>Supabase URL<input id="supabaseUrl" placeholder="https://xxxx.supabase.co"></label><label>Supabase publishable key<input id="supabaseKey" placeholder="sb_publishable_..."></label><div class="actions"><button id="saveCloud" class="secondary" type="button">&#20445;&#23384;&#37197;&#32622;&#24182;&#21516;&#27493;</button><button id="newSpace" class="ghost" type="button">&#26032;&#24314;&#21516;&#27493;&#31354;&#38388;</button></div><p class="small">&#20808;&#22312; Supabase SQL Editor &#25191;&#34892;&#20179;&#24211;&#37324;&#30340; <code>supabase-schema.sql</code>&#12290;GitHub Pages &#21482;&#25176;&#31649;&#31354;&#30340;&#24037;&#20855;&#39029;&#38754;&#12290;</p></div></aside><section class="panel"><div class="actions" style="justify-content:space-between;margin-bottom:14px"><h2 style="margin:0">&#20840;&#37096;&#20498;&#35745;&#26102;</h2><div id="status" class="status">&#20351;&#29992;&#26412;&#22320;&#20445;&#23384;&#12290;</div></div><div id="events" class="events"></div></section></section>
</main>
<script type="module">
const S_EVENTS='anniversary-countdown.events',S_CONFIG='anniversary-countdown.supabase',S_OWNER='anniversary-countdown.owner';
const params=new URLSearchParams(location.search);let events=[],client=null,owner=params.get('sync')||localStorage.getItem(S_OWNER)||id('owner');
const $=s=>document.querySelector(s),el={form:$('#form'),eventId:$('#eventId'),title:$('#title'),date:$('#date'),category:$('#category'),note:$('#note'),save:$('#save'),clear:$('#clear'),events:$('#events'),status:$('#status'),url:$('#supabaseUrl'),key:$('#supabaseKey'),saveCloud:$('#saveCloud'),newSpace:$('#newSpace'),share:$('#share'),shareBox:$('#shareBox'),shareLink:$('#shareLink'),export:$('#export'),importBtn:$('#importBtn'),importFile:$('#importFile')};
const labels={anniversary:'\u7eaa\u5ff5\u65e5',birthday:'\u751f\u65e5',exam:'\u8003\u8bd5',travel:'\u65c5\u884c',work:'\u5de5\u4f5c',custom:'\u5176\u4ed6'};
function id(prefix='event'){return crypto.randomUUID?crypto.randomUUID():`${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`}
function msg(t,c=''){el.status.textContent=t;el.status.className=`status ${c}`.trim()}
function esc(v){return String(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
function norm(e){const title=String(e?.title||'').trim(),date=String(e?.date||'').trim(),category=String(e?.category||'custom').trim()||'custom',note=String(e?.note||'').trim();if(!title)throw Error('\u6807\u9898\u4e0d\u80fd\u4e3a\u7a7a');if(!date)throw Error('\u65e5\u671f\u4e0d\u80fd\u4e3a\u7a7a');if(!/^\d{4}-\d{2}-\d{2}$/.test(date))throw Error('Date must be YYYY-MM-DD');return{id:String(e?.id||'').trim(),title,date,category,note}}
function days(date){const [y,m,d]=date.split('-').map(Number),target=new Date(y,m-1,d),now=new Date(),base=new Date(now.getFullYear(),now.getMonth(),now.getDate());return Math.round((target-base)/86400000)}
function dist(date){const n=days(date);if(n>0)return{tone:'future',label:`\u8fd8\u6709 ${n} \u5929`};if(n<0)return{tone:'past',label:`\u5df2\u8fc7\u53bb ${Math.abs(n)} \u5929`};return{tone:'today',label:'\u5c31\u662f\u4eca\u5929'}}
function sorted(){return[...events].sort((a,b)=>{const x=days(a.date),y=days(b.date);if(x>=0&&y<0)return-1;if(x<0&&y>=0)return 1;return Math.abs(x)-Math.abs(y)})}
function pack(list){return btoa(unescape(encodeURIComponent(JSON.stringify(list.map(norm)))))}
function unpack(data){const v=JSON.parse(decodeURIComponent(escape(atob(data))));if(!Array.isArray(v))throw Error('Bad shared data');return v.map(norm)}
function cfg(raw){const url=String(raw?.url||'').trim(),key=String(raw?.key||'').trim().replace(/\s+/g,'_');let u;try{u=new URL(url)}catch{throw Error('Supabase URL must be https://xxxx.supabase.co')}if(!u.hostname.endsWith('.supabase.co'))throw Error('Supabase URL must be https://xxxx.supabase.co');return{url:`${u.protocol}//${u.hostname}`,key}}
function saveLocal(){localStorage.setItem(S_EVENTS,JSON.stringify(events));localStorage.setItem(S_OWNER,owner)}
function loadLocal(){try{const v=JSON.parse(localStorage.getItem(S_EVENTS)||'[]');events=Array.isArray(v)?v.map(norm):[]}catch{events=[]}}
function readCfg(){try{return JSON.parse(localStorage.getItem(S_CONFIG)||'{}')}catch{return{}}}
function writeCfg(c){localStorage.setItem(S_CONFIG,JSON.stringify(c))}
async function connect(){const s=readCfg();if(!s.url||!s.key)return false;const c=cfg(s);el.url.value=c.url;el.key.value=c.key;const{createClient}=await import('https://esm.sh/@supabase/supabase-js@2');client=createClient(c.url,c.key);return true}
async function pull(){if(!client)return;const{data,error}=await client.from('countdown_events').select('id,title,date,category,note').eq('owner_key',owner).order('date',{ascending:true});if(error)throw error;events=data.map(norm);saveLocal()}
async function push(){if(!client)return;const rows=events.map(e=>({...e,owner_key:owner}));const del=await client.from('countdown_events').delete().eq('owner_key',owner);if(del.error)throw del.error;if(rows.length){const ins=await client.from('countdown_events').insert(rows);if(ins.error)throw ins.error}}
async function persist(){saveLocal();render();if(!client)return msg('\u5df2\u4fdd\u5b58\u5230\u672c\u5730\u3002\u914d\u7f6e\u4e91\u7aef\u540e\u53ef\u8de8\u8bbe\u5907\u540c\u6b65\u3002','warn');try{await push();msg('\u5df2\u540c\u6b65\u5230\u4e91\u7aef\u3002','ok')}catch(e){msg(`Cloud sync failed: ${e.message}`,'error')}}
function render(){const list=sorted();if(!list.length){el.events.innerHTML='<div class="empty">\u8fd8\u6ca1\u6709\u5012\u8ba1\u65f6\uff0c\u5148\u6dfb\u52a0\u4e00\u4e2a\u91cd\u8981\u65e5\u671f\u3002</div>';return}el.events.innerHTML=list.map(e=>{const d=dist(e.date);return`<article class="event"><div><h3>${esc(e.title)}</h3><div class="meta"><span>${esc(labels[e.category]||labels.custom)}</span><span>${esc(e.date)}</span></div>${e.note?`<div class="note">${esc(e.note)}</div>`:''}<div class="actions" style="margin-top:12px"><button class="ghost" data-edit="${e.id}" type="button">\u7f16\u8f91</button><button class="danger" data-delete="${e.id}" type="button">\u5220\u9664</button></div></div><div class="count ${d.tone}">${esc(d.label)}</div></article>`}).join('')}
function reset(){el.eventId.value='';el.form.reset();el.category.value='anniversary';el.save.textContent='\u4fdd\u5b58'}
el.form.addEventListener('submit',async ev=>{ev.preventDefault();try{const item=norm({id:el.eventId.value||id(),title:el.title.value,date:el.date.value,category:el.category.value,note:el.note.value});const i=events.findIndex(x=>x.id===item.id);if(i>=0)events[i]=item;else events.push(item);reset();await persist()}catch(e){msg(e.message,'error')}});
el.events.addEventListener('click',async ev=>{const edit=ev.target.dataset.edit,del=ev.target.dataset.delete;if(edit){const e=events.find(x=>x.id===edit);if(!e)return;el.eventId.value=e.id;el.title.value=e.title;el.date.value=e.date;el.category.value=e.category;el.note.value=e.note;el.save.textContent='\u66f4\u65b0'}if(del){events=events.filter(x=>x.id!==del);await persist()}});
el.saveCloud.addEventListener('click',async()=>{try{const c=cfg({url:el.url.value,key:el.key.value});writeCfg(c);el.url.value=c.url;el.key.value=c.key;await connect();await pull();render();msg('\u4e91\u7aef\u914d\u7f6e\u5df2\u4fdd\u5b58\uff0c\u5e76\u5df2\u62c9\u53d6\u5f53\u524d\u540c\u6b65\u7a7a\u95f4\u7684\u6570\u636e\u3002','ok')}catch(e){msg(`Connection failed: ${e.message}`,'error')}});
el.newSpace.addEventListener('click',()=>{owner=id('owner');localStorage.setItem(S_OWNER,owner);msg('\u5df2\u521b\u5efa\u65b0\u7684\u540c\u6b65\u7a7a\u95f4\u3002','ok')});
el.share.addEventListener('click',async()=>{const u=new URL(location.href);u.searchParams.set('sync',owner);if(events.length)u.searchParams.set('data',pack(events));const link=u.toString();el.shareLink.value=link;el.shareBox.classList.add('on');el.shareLink.focus();el.shareLink.select();let copied=false;try{await navigator.clipboard.writeText(link);copied=true}catch{}msg(copied?'\u540c\u6b65\u94fe\u63a5\u5df2\u663e\u793a\u5e76\u590d\u5236\u3002':'\u8bf7\u624b\u52a8\u590d\u5236\u9875\u9762\u4e2d\u663e\u793a\u7684\u540c\u6b65\u94fe\u63a5\u3002',copied?'ok':'warn')});
el.export.addEventListener('click',()=>{const b=new Blob([JSON.stringify(events,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='anniversary-countdown.json';a.click();URL.revokeObjectURL(a.href)});
el.importBtn.addEventListener('click',()=>el.importFile.click());el.importFile.addEventListener('change',async()=>{const f=el.importFile.files[0];if(!f)return;try{events=JSON.parse(await f.text()).map(x=>norm({...x,id:x.id||id()}));await persist()}catch(e){msg(`Import failed: ${e.message}`,'error')}finally{el.importFile.value=''}});el.clear.addEventListener('click',reset);
async function init(){localStorage.setItem(S_OWNER,owner);loadLocal();if(params.get('data')){try{events=unpack(params.get('data')).map(e=>({...e,id:e.id||id()}));saveLocal()}catch(e){msg(`Shared data failed: ${e.message}`,'error')}}render();try{if(await connect()){await pull();render();msg('\u5df2\u8fde\u63a5\u4e91\u7aef\u540c\u6b65\u3002','ok')}}catch(e){msg(`Cloud not connected: ${e.message}`,'warn')}}init();
</script>
</body>
