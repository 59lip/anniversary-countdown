<div class="shell"><aside class="app-sidebar"><div class="sidebar-top"><div class="brand"><div class="brand-mark">☁</div><div class="brand-text"><div class="brand-title">每一迹</div><div class="brand-sub">重要的日子</div></div></div><button id="sidebarToggle" class="icon-btn" type="button" title="折叠">☰</button></div><nav class="nav"><button class="nav-btn active" type="button" data-view-target="home"><span class="nav-ico">⌂</span><span class="nav-label">首页</span></button><button class="nav-btn" type="button" data-view-target="cloud"><span class="nav-ico">⚙</span><span class="nav-label">云端同步设置</span></button></nav></aside><main class="content"><div class="topbar"><h1 class="page-title">纪念日倒计时</h1><div class="top-actions"><div id="status" class="status"></div><button id="homeSync" class="btn ghost" type="button">同步</button><button id="addEventButton" class="fab" type="button" aria-label="添加重要日期">+</button></div></div><section id="homeView" class="view active"><section id="eventsSection" class="section"><div class="section-head"><h2>全部倒计时</h2><div class="pill-row"><button class="pill active" type="button" data-filter="all">全部</button><button class="pill" type="button" data-filter="recent">最近</button><button class="pill" type="button" data-filter="today">今天</button></div></div><div id="events" class="cards"></div></section></section><dialog id="eventDialog" class="modal"><div class="modal-panel"><div class="modal-head"><div><h2>添加重要日期</h2><p class="muted">填入后会自动保存</p></div><button id="closeEventDialog" class="modal-close" type="button" aria-label="关闭">×</button></div><form id="eventForm"><input id="eventId" type="hidden"><input id="icon" type="hidden"><div class="form-grid"><label>标题<input id="title" required maxlength="80" placeholder="例如：高考、生日、旅行"></label><label>日期<input id="date" required type="date"></label><label>分类<select id="category"><option value="anniversary">纪念日</option><option value="birthday">生日</option><option value="exam">考试</option><option value="travel">旅行</option><option value="work">工作</option><option value="custom">其他</option></select></label><label>日期方式<select id="repeatType"><option value="none">确定的日子</option><option value="weekly">每周循环</option><option value="monthly">每月循环</option><option value="yearly">每年循环</option></select></label><label id="weeklyField" class="conditional-field">每周<select id="weeklyValue"><option value="1">周一</option><option value="2">周二</option><option value="3">周三</option><option value="4">周四</option><option value="5">周五</option><option value="6">周六</option><option value="0">周日</option></select></label><label id="monthlyField" class="conditional-field">每月几号<input id="monthlyValue" type="number" min="1" max="31" inputmode="numeric" placeholder="10"></label><label id="yearlyField" class="conditional-field">每年几月几日<input id="yearlyValue" type="text" inputmode="numeric" placeholder="09-06"></label><div class="wide"><label>图标</label><div id="iconPicker" class="icon-picker" aria-label="选择倒计时图标"></div><div class="repeat-hint">不选时会根据分类自动使用默认图标。</div></div><label class="wide">备注<textarea id="note" maxlength="240" placeholder="礼物、地点、准备事项"></textarea></label></div><div class="actions" style="margin-top:14px"><button id="saveEvent" class="btn" type="submit">保存</button><button id="resetForm" class="btn ghost" type="button">清空</button><button id="exportJson" class="btn ghost" type="button">导出 JSON</button><input id="importJson" type="file" accept="application/json" hidden><button id="importButton" class="btn ghost" type="button">导入 JSON</button></div></form></div></dialog><section id="cloudView" class="view"><div class="settings-grid"><section class="panel"><div class="section-head"><h2>云端同步设置</h2><span class="muted">Supabase</span></div><label>Supabase URL<input id="supabaseUrl" placeholder="https://xxxx.supabase.co"></label><label>Supabase publishable key<input id="supabaseKey" placeholder="sb_publishable_..."></label><div class="actions cloud-actions"><button id="saveCloud" class="btn" type="button">保存配置并同步</button><button id="newSpace" class="btn ghost" type="button">新建同步空间</button><button id="shareSync" class="btn secondary" type="button">生成同步链接</button></div><div id="shareOutput" class="share-box"><label>发给手机的同步链接<input id="shareLink" readonly></label></div></section><aside class="tip-card"><h2>使用方式</h2><p>公开的 GitHub Pages 只是工具页面。你的数据由 Supabase 保存，生成的同步链接决定哪一个同步空间。</p><p>手机打开链接后，填同一个 URL 和 key，再点“保存配置并同步”。</p></aside></div></section></main></div>
<script type="module">

const STORAGE_EVENTS='anniversary-countdown.events',STORAGE_CONFIG='anniversary-countdown.supabase',STORAGE_OWNER='anniversary-countdown.owner',params=new URLSearchParams(location.search);let events=[],supabaseClient=null,ownerKey=params.get('sync')||localStorage.getItem(STORAGE_OWNER)||createOwnerKey(),currentFilter='all',statusTimer=null;
const iconOptions=[['heart','💚'],['cake','🎂'],['book','📚'],['train','🚆'],['wallet','💰'],['home','🏠'],['clock','⏰'],['gift','🎁'],['star','⭐'],['calendar','📅'],['plane','✈️'],['briefcase','💼']],defaultIcons={anniversary:'heart',birthday:'cake',exam:'book',travel:'train',work:'briefcase',custom:'star'},text={save:'保存',update:'更新',empty:'还没有倒计时。',localSaved:'已保存到本地。配置云端后可跨设备同步。',cloudSaved:'已同步到云端。',cloudConnected:'已连接云端同步。',configSaved:'已同步。',shareCopied:'同步链接已显示并复制。',shareShown:'复制受限，请手动复制页面中显示的同步链接。'},labels={anniversary:'纪念日',birthday:'生日',exam:'考试',travel:'旅行',work:'工作',custom:'其他'};
const el={sidebarToggle:document.querySelector('#sidebarToggle'),navButtons:document.querySelectorAll('[data-view-target]'),addEventButton:document.querySelector('#addEventButton'),homeSync:document.querySelector('#homeSync'),eventDialog:document.querySelector('#eventDialog'),closeEventDialog:document.querySelector('#closeEventDialog'),form:document.querySelector('#eventForm'),eventId:document.querySelector('#eventId'),title:document.querySelector('#title'),date:document.querySelector('#date'),category:document.querySelector('#category'),repeatType:document.querySelector('#repeatType'),weeklyField:document.querySelector('#weeklyField'),weeklyValue:document.querySelector('#weeklyValue'),monthlyField:document.querySelector('#monthlyField'),monthlyValue:document.querySelector('#monthlyValue'),yearlyField:document.querySelector('#yearlyField'),yearlyValue:document.querySelector('#yearlyValue'),icon:document.querySelector('#icon'),iconPicker:document.querySelector('#iconPicker'),note:document.querySelector('#note'),events:document.querySelector('#events'),status:document.querySelector('#status'),filterButtons:document.querySelectorAll('[data-filter]'),supabaseUrl:document.querySelector('#supabaseUrl'),supabaseKey:document.querySelector('#supabaseKey'),saveCloud:document.querySelector('#saveCloud'),newSpace:document.querySelector('#newSpace'),shareSync:document.querySelector('#shareSync'),shareOutput:document.querySelector('#shareOutput'),shareLink:document.querySelector('#shareLink'),exportJson:document.querySelector('#exportJson'),importJson:document.querySelector('#importJson'),importButton:document.querySelector('#importButton'),saveEvent:document.querySelector('#saveEvent'),resetForm:document.querySelector('#resetForm')};
function setStatus(message,tone='',timeout=5000){clearTimeout(statusTimer);el.status.textContent=message;el.status.className=`status ${tone}`.trim();if(message&&timeout){statusTimer=setTimeout(()=>{el.status.textContent='';el.status.className='status';},timeout);}}function showView(name){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.querySelector(`#${name}View`).classList.add('active');document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.viewTarget===name));}function escapeHtml(value){return String(value).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');}function selectedIcon(event){const iconName=event.icon||defaultIcons[event.category]||defaultIcons.custom;return iconOptions.find(([name])=>name===iconName)?.[1]||'⭐';}function renderIconPicker(){el.iconPicker.innerHTML=iconOptions.map(([name,icon])=>`<button class="icon-choice" type="button" data-icon="${name}" aria-label="图标 ${name}">${icon}</button>`).join('');}function setActiveIcon(iconName=''){el.icon.value=iconName;el.iconPicker.querySelectorAll('.icon-choice').forEach(button=>button.classList.toggle('active',button.dataset.icon===iconName));}function updateRepeatFields(){const type=el.repeatType.value;el.weeklyField.classList.toggle('active',type==='weekly');el.monthlyField.classList.toggle('active',type==='monthly');el.yearlyField.classList.toggle('active',type==='yearly');if(type==='weekly'&&!el.weeklyValue.value)el.weeklyValue.value=String(new Date().getDay());if(type==='monthly'&&!el.monthlyValue.value)el.monthlyValue.value='10';if(type==='yearly'&&!el.yearlyValue.value)el.yearlyValue.value='09-06';}function readRepeatValue(){if(el.repeatType.value==='weekly')return el.weeklyValue.value;if(el.repeatType.value==='monthly')return el.monthlyValue.value;if(el.repeatType.value==='yearly')return el.yearlyValue.value;return '';}function readConfig(){try{return JSON.parse(localStorage.getItem(STORAGE_CONFIG)||'{}');}catch{return{};}}function writeConfig(config){localStorage.setItem(STORAGE_CONFIG,JSON.stringify(config));}function loadLocal(){try{const local=JSON.parse(localStorage.getItem(STORAGE_EVENTS)||'[]');events=Array.isArray(local)?local.map(normalizeEvent):[];}catch{events=[];}}function saveLocal(){localStorage.setItem(STORAGE_EVENTS,JSON.stringify(events));localStorage.setItem(STORAGE_OWNER,ownerKey);}function cloudRowToEvent(row){return normalizeEvent({id:row.id,title:row.title,date:row.date,category:row.category,icon:row.icon,repeatType:row.repeat_type,repeatValue:row.repeat_value,updatedAt:row.updated_at,deletedAt:row.deleted_at,note:row.note});}function eventToCloudRow(event){const normalized=normalizeEvent(event);return{id:normalized.id,title:normalized.title,date:normalized.date,category:normalized.category,icon:normalized.icon,repeat_type:normalized.repeatType,repeat_value:normalized.repeatValue,updated_at:normalized.updatedAt||new Date().toISOString(),deleted_at:normalized.deletedAt||null,note:normalized.note,owner_key:ownerKey};}function isMissingCloudColumns(error){return/column .*countdown_events\.(icon|repeat_type|repeat_value|updated_at|deleted_at).*does not exist/i.test(String(error?.message||''));}
async function connectSupabase(){const saved=readConfig();if(!saved.url||!saved.key)return false;const config=normalizeSupabaseConfig(saved);el.supabaseUrl.value=config.url;el.supabaseKey.value=config.key;const{createClient}=await import('https://esm.sh/@supabase/supabase-js@2');supabaseClient=createClient(config.url,config.key);return true;}async function pullCloud(){if(!supabaseClient)return;const localBeforePull=[...events];let missingColumns=false;let{data,error}=await supabaseClient.from('countdown_events').select('id,title,date,category,icon,repeat_type,repeat_value,updated_at,deleted_at,note').eq('owner_key',ownerKey).order('date',{ascending:true});if(isMissingCloudColumns(error)){missingColumns=true;const fallback=await supabaseClient.from('countdown_events').select('id,title,date,category,note').eq('owner_key',ownerKey).order('date',{ascending:true});data=fallback.data;error=fallback.error;setStatus('云端表还没更新字段：请执行 supabase-schema.sql。','warn');}if(error)throw error;const cloudEvents=(data||[]).map(cloudRowToEvent);if(shouldKeepLocalAfterCloudPull(localBeforePull,cloudEvents,{missingColumns})){events=localBeforePull;saveLocal();return;}events=mergeEventsForSync(localBeforePull,cloudEvents);saveLocal();}async function pushCloud(){if(!supabaseClient)return;const rows=events.map(eventToCloudRow);if(rows.length===0)return;const{error}=await supabaseClient.from('countdown_events').upsert(rows,{onConflict:'id'});if(error)throw error;}async function syncNow(){const connected=supabaseClient||await connectSupabase();if(!connected){setStatus('请先配置云端同步。','warn');showView('cloud');return;}await pullCloud();await pushCloud();await pullCloud();render();setStatus(text.configSaved,'ok');}async function persist(){saveLocal();render();if(!supabaseClient){setStatus(text.localSaved,'warn');return;}try{await pushCloud();setStatus(text.cloudSaved,'ok');}catch(error){setStatus(`云端同步失败：${error.message}`,'error');}}
function render(){const visible=filterEvents(events,currentFilter);if(visible.length===0){el.events.innerHTML=`<div class="empty">${text.empty}</div>`;return;}el.events.innerHTML=visible.map((event,index)=>{const distance=describeEventDistance(event),dark=index%5===1,titleSuffix=distance.tone==='future'?'还有':'';return`<article class="count-card ${dark?'dark':''}"><div class="card-actions"><button class="mini-btn" type="button" data-edit="${escapeHtml(event.id)}">编辑</button><button class="mini-btn" type="button" data-delete="${escapeHtml(event.id)}">删除</button></div><h3>${escapeHtml(event.title)}${titleSuffix}</h3><div class="big-count"><strong>${escapeHtml(distance.num)}</strong><span>${escapeHtml(distance.unit)}</span></div><div class="card-meta"><span>${escapeHtml(labels[event.category]||labels.custom)}</span><span>${escapeHtml(formatEventRule(event))}</span>${event.note?`<span>${escapeHtml(event.note)}</span>`:''}</div><div class="card-emoji">${selectedIcon(event)}</div></article>`;}).join('');}
async function copyText(value){if(navigator.clipboard?.writeText){try{await navigator.clipboard.writeText(value);return true;}catch{}}const area=document.createElement('textarea');area.value=value;area.style.position='fixed';area.style.left='-9999px';document.body.append(area);area.select();const copied=document.execCommand('copy');area.remove();return copied;}function resetForm(){el.eventId.value='';el.form.reset();el.category.value='anniversary';el.repeatType.value='none';el.weeklyValue.value='5';el.monthlyValue.value='10';el.yearlyValue.value='09-06';setActiveIcon('');updateRepeatFields();el.saveEvent.textContent=text.save;}function openEventDialog(item=null){if(item){el.eventId.value=item.id;el.title.value=item.title;el.date.value=item.date;el.category.value=item.category;el.repeatType.value=item.repeatType||'none';el.weeklyValue.value=item.repeatType==='weekly'?item.repeatValue:'5';el.monthlyValue.value=item.repeatType==='monthly'?item.repeatValue:'10';el.yearlyValue.value=item.repeatType==='yearly'?item.repeatValue:'09-06';el.note.value=item.note;setActiveIcon(item.icon||'');updateRepeatFields();el.saveEvent.textContent=text.update;}else resetForm();el.eventDialog.showModal();setTimeout(()=>el.title.focus(),0);}function closeEventDialog(){el.eventDialog.close();}function readFormEvent(){return normalizeEvent({id:el.eventId.value||createId(),title:el.title.value,date:el.date.value,category:el.category.value,icon:el.icon.value,repeatType:el.repeatType.value,repeatValue:readRepeatValue(),updatedAt:new Date().toISOString(),note:el.note.value});}
el.sidebarToggle.addEventListener('click',()=>document.body.classList.toggle('sidebar-collapsed'));el.navButtons.forEach(button=>button.addEventListener('click',()=>showView(button.dataset.viewTarget)));el.addEventButton.addEventListener('click',()=>openEventDialog());el.homeSync.addEventListener('click',async()=>{try{await syncNow();}catch(error){setStatus(`同步失败：${error.message}`,'error');}});el.filterButtons.forEach(button=>button.addEventListener('click',()=>{currentFilter=button.dataset.filter;el.filterButtons.forEach(item=>item.classList.toggle('active',item===button));render();}));el.closeEventDialog.addEventListener('click',closeEventDialog);el.eventDialog.addEventListener('click',event=>{if(event.target===el.eventDialog)closeEventDialog();});el.repeatType.addEventListener('change',updateRepeatFields);el.iconPicker.addEventListener('click',event=>{const button=event.target.closest('[data-icon]');if(!button)return;setActiveIcon(el.icon.value===button.dataset.icon?'':button.dataset.icon);});el.form.addEventListener('submit',async event=>{event.preventDefault();try{const normalized=readFormEvent();const index=events.findIndex(item=>item.id===normalized.id);if(index>=0)events[index]=normalized;else events.push(normalized);resetForm();closeEventDialog();await persist();}catch(error){setStatus(error.message,'error');}});el.events.addEventListener('click',async event=>{const editId=event.target.dataset.edit,deleteId=event.target.dataset.delete;if(editId){const item=events.find(entry=>entry.id===editId);if(!item)return;openEventDialog(item);}if(deleteId){const deletedAt=new Date().toISOString();events=events.map(entry=>entry.id===deleteId?{...entry,updatedAt:deletedAt,deletedAt}:entry);await persist();}});el.saveCloud.addEventListener('click',async()=>{try{const config=normalizeSupabaseConfig({url:el.supabaseUrl.value,key:el.supabaseKey.value});writeConfig(config);el.supabaseUrl.value=config.url;el.supabaseKey.value=config.key;supabaseClient=null;await syncNow();}catch(error){setStatus(`连接失败：${error.message}`,'error');}});el.newSpace.addEventListener('click',()=>{ownerKey=createOwnerKey();localStorage.setItem(STORAGE_OWNER,ownerKey);setStatus('已创建新的同步空间。','ok');});el.shareSync.addEventListener('click',async()=>{const url=new URL(location.href);url.search='';url.searchParams.set('sync',ownerKey);const link=url.toString();el.shareLink.value=link;el.shareOutput.classList.add('active');el.shareLink.focus();el.shareLink.select();const copied=await copyText(link);setStatus(copied?text.shareCopied:text.shareShown,copied?'ok':'warn');});el.exportJson.addEventListener('click',()=>{const blob=new Blob([JSON.stringify(events,null,2)],{type:'application/json'});const link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download='anniversary-countdown.json';link.click();URL.revokeObjectURL(link.href);});el.importButton.addEventListener('click',()=>el.importJson.click());el.importJson.addEventListener('change',async()=>{const file=el.importJson.files[0];if(!file)return;try{const imported=JSON.parse(await file.text());events=imported.map(item=>normalizeEvent({...item,id:item.id||createId(),updatedAt:item.updatedAt||new Date().toISOString()}));await persist();}catch(error){setStatus(`导入失败：${error.message}`,'error');}finally{el.importJson.value='';}});el.resetForm.addEventListener('click',resetForm);
async function init(){renderIconPicker();resetForm();localStorage.setItem(STORAGE_OWNER,ownerKey);loadLocal();const sharedData=params.get('data');if(sharedData){try{events=deserializeEvents(sharedData).map(event=>({...event,id:event.id||createId(),updatedAt:event.updatedAt||new Date().toISOString()}));saveLocal();}catch(error){setStatus(`分享数据读取失败：${error.message}`,'error');}}render();try{const connected=await connectSupabase();if(connected){await pullCloud();render();setStatus(text.cloudConnected,'ok');}}catch(error){setStatus(`云端未连接：${error.message}`,'warn');}}
init();
</script>
</body>
