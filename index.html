<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>纪念日倒计时</title>
<style>
*{box-sizing:border-box}html{background:#f4f5f7}body{margin:0;min-height:100vh;background:#f4f5f7;color:#121212;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.shell{display:grid;grid-template-columns:248px 1fr;min-height:100vh}.app-sidebar{position:sticky;top:0;height:100vh;padding:18px 14px;background:#fff;border-right:1px solid #e7e7e7;transition:width .2s ease,padding .2s ease;overflow:hidden}.brand{display:flex;gap:12px;align-items:center;margin-bottom:22px}.brand-mark{width:40px;height:40px;border-radius:14px;background:#121212;color:#fff;display:grid;place-items:center;font-weight:900}.brand-title{font-weight:900;font-size:18px;white-space:nowrap}.brand-sub{font-size:12px;color:#8b8b8b;white-space:nowrap}.sidebar-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.icon-btn{width:38px;height:38px;border:0;border-radius:14px;background:#f1f1f1;color:#111;cursor:pointer;font-size:18px}.nav{display:grid;gap:8px}.nav-btn{border:0;width:100%;display:flex;align-items:center;gap:12px;padding:12px 13px;border-radius:16px;background:transparent;color:#555;font-weight:800;cursor:pointer;text-align:left}.nav-btn.active{background:#111;color:#fff}.nav-ico{font-size:18px;width:22px;text-align:center}.sidebar-collapsed .shell{grid-template-columns:84px 1fr}.sidebar-collapsed .app-sidebar{padding:18px 10px}.sidebar-collapsed .brand-text,.sidebar-collapsed .nav-label{display:none}.sidebar-collapsed .nav-btn{justify-content:center;padding:12px 0}.content{padding:28px;width:min(1160px,100%);margin:0 auto}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:20px}.eyebrow{font-weight:900;color:#69c4a2;font-size:14px}.page-title{margin:4px 0 6px;font-size:clamp(30px,5vw,54px);font-weight:950;letter-spacing:0;line-height:1}.page-copy{margin:0;color:#777}.status{min-height:38px;display:flex;align-items:center;padding:9px 13px;border-radius:999px;background:#fff;color:#777;border:1px solid #e7e7e7;font-size:14px}.status.ok{color:#15803d}.status.warn{color:#b45309}.status.error{color:#b42318}.view{display:none}.view.active{display:block}.section{margin-bottom:22px}.section-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}h2{margin:0;font-size:22px}.muted{color:#7a7a7a}.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}.count-card{position:relative;min-height:188px;border-radius:30px;background:#fff;padding:22px;box-shadow:0 18px 40px rgba(0,0,0,.06);overflow:hidden}.count-card.dark{background:#202020;color:#fff}.count-card h3{margin:0 0 16px;font-size:21px;line-height:1.15;overflow-wrap:anywhere}.big-count{display:flex;align-items:baseline;gap:7px;margin-bottom:16px}.big-count strong{font-size:54px;line-height:.9;letter-spacing:0;font-weight:950}.big-count span{font-size:18px;font-weight:900}.card-meta{display:grid;gap:6px;color:#9a9a9a;font-weight:700}.card-emoji{position:absolute;right:18px;bottom:16px;font-size:48px;filter:drop-shadow(0 8px 12px rgba(0,0,0,.12))}.card-actions{position:absolute;right:14px;top:14px;display:flex;gap:7px;opacity:0;transition:opacity .15s}.count-card:hover .card-actions{opacity:1}.mini-btn{border:0;border-radius:999px;padding:7px 10px;background:#f0f0f0;color:#111;cursor:pointer}.dark .mini-btn{background:#333;color:#fff}.empty{border:1px dashed #d7d7d7;border-radius:28px;background:#fff;padding:38px;text-align:center;color:#777}.panel{background:#fff;border-radius:30px;padding:22px;box-shadow:0 18px 40px rgba(0,0,0,.06)}.form-grid{display:grid;grid-template-columns:1fr 180px;gap:14px}.form-grid .wide{grid-column:1/-1}label{display:grid;gap:7px;font-weight:800;color:#333}input,select,textarea{width:100%;min-height:46px;border:1px solid #e2e2e2;border-radius:16px;background:#fafafa;padding:11px 13px;font:inherit}textarea{min-height:88px;resize:vertical}.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.btn{border:0;border-radius:16px;min-height:46px;padding:11px 16px;background:#111;color:#fff;font-weight:900;cursor:pointer}.btn.secondary{background:#e9f7f1;color:#12805b}.btn.ghost{background:#f1f1f1;color:#111}.home-sync{display:flex;justify-content:space-between;gap:12px;align-items:center}.settings-grid{display:grid;grid-template-columns:minmax(0,620px) 1fr;gap:18px}.share-box{display:none;margin-top:14px}.share-box.active{display:block}.share-box input{background:#fff}.tip-card{border-radius:30px;background:#202020;color:#fff;padding:22px;min-height:180px}.tip-card p{color:#cfcfcf;line-height:1.65}.cloud-actions{margin-top:14px}.pill-row{display:flex;gap:8px;flex-wrap:wrap}.pill{border-radius:999px;padding:8px 12px;background:#f0f0f0;color:#555;font-weight:800}.pill.active{background:#111;color:#fff}@media(max-width:880px){.shell{grid-template-columns:1fr}.app-sidebar{position:fixed;z-index:10;left:12px;right:12px;bottom:12px;top:auto;height:auto;border:1px solid #e7e7e7;border-radius:28px;padding:10px}.brand,.sidebar-top{display:none}.nav{grid-template-columns:1fr 1fr}.nav-btn{justify-content:center}.content{padding:18px 12px 110px}.topbar{display:block}.status{margin-top:12px}.settings-grid,.form-grid{grid-template-columns:1fr}.cards{grid-template-columns:1fr 1fr}.count-card{min-height:170px;border-radius:26px}.big-count strong{font-size:46px}.card-actions{opacity:1}}@media(max-width:560px){.cards{grid-template-columns:1fr}.home-sync{display:grid}.section-head{align-items:flex-start;display:grid}}
</style>
</head>
<body>
<div class="shell">
<aside class="app-sidebar"><div class="sidebar-top"><div class="brand"><div class="brand-mark">☁</div><div class="brand-text"><div class="brand-title">每一迹</div><div class="brand-sub">重要的日子</div></div></div><button id="sidebarToggle" class="icon-btn" type="button">☰</button></div><nav class="nav"><button class="nav-btn active" type="button" data-view-target="home"><span class="nav-ico">⌂</span><span class="nav-label">首页</span></button><button class="nav-btn" type="button" data-view-target="cloud"><span class="nav-ico">⚙</span><span class="nav-label">云端同步设置</span></button></nav></aside>
<main class="content"><div class="topbar"><div><div class="eyebrow">卡片式倒计时</div><h1 class="page-title">纪念日倒计时</h1><p class="page-copy">用清晰的卡片记住纪念日、生日、考试和旅行。</p></div><div id="status" class="status">使用本地保存。</div></div>
<section id="homeView" class="view active"><section id="eventsSection" class="section"><div class="section-head"><h2>全部倒计时</h2><div class="pill-row"><span class="pill active">全部</span><span class="pill">最近</span><span class="pill">今天</span></div></div><div id="events" class="cards"></div></section><section id="addSection" class="section panel"><div class="section-head"><h2>添加重要日期</h2><span class="muted">填入后会自动保存</span></div><form id="eventForm"><input id="eventId" type="hidden"><div class="form-grid"><label>标题<input id="title" required maxlength="80" placeholder="例如：高考、生日、旅行"></label><label>日期<input id="date" required type="date"></label><label>分类<select id="category"><option value="anniversary">纪念日</option><option value="birthday">生日</option><option value="exam">考试</option><option value="travel">旅行</option><option value="work">工作</option><option value="custom">其他</option></select></label><label class="wide">备注<textarea id="note" maxlength="240" placeholder="礼物、地点、准备事项"></textarea></label></div><div class="actions" style="margin-top:14px"><button id="saveEvent" class="btn" type="submit">保存</button><button id="resetForm" class="btn ghost" type="button">清空</button><button id="exportJson" class="btn ghost" type="button">导出 JSON</button><input id="importJson" type="file" accept="application/json" hidden><button id="importButton" class="btn ghost" type="button">导入 JSON</button></div></form></section><section id="homeSyncSection" class="section panel home-sync"><div><h2>同步</h2><p class="muted">将当前倒计时保存到云端，或从云端拉取最新数据。</p></div><div class="actions"><button id="syncNow" class="btn secondary" type="button">立即同步</button><button class="btn ghost" type="button" data-view-target="cloud">云端设置</button></div></section></section>
<section id="cloudView" class="view"><div class="settings-grid"><section class="panel"><div class="section-head"><h2>云端同步设置</h2><span class="muted">Supabase</span></div><label>Supabase URL<input id="supabaseUrl" placeholder="https://xxxx.supabase.co"></label><label>Supabase publishable key<input id="supabaseKey" placeholder="sb_publishable_..."></label><div class="actions cloud-actions"><button id="saveCloud" class="btn" type="button">保存配置并同步</button><button id="newSpace" class="btn ghost" type="button">新建同步空间</button><button id="shareSync" class="btn secondary" type="button">生成同步链接</button></div><div id="shareOutput" class="share-box"><label>发给手机的同步链接<input id="shareLink" readonly></label></div></section><aside class="tip-card"><h2>使用方式</h2><p>公开的 GitHub Pages 只是工具页面。你的数据由 Supabase 保存，生成的同步链接决定哪一个同步空间。</p><p>手机打开链接后，填同一个 URL 和 key，再点“保存配置并同步”。</p></aside></div></section></main></div>
<script type="module">
const DAY_MS=86400000,STORAGE_EVENTS='anniversary-countdown.events',STORAGE_CONFIG='anniversary-countdown.supabase',STORAGE_OWNER='anniversary-countdown.owner';const params=new URLSearchParams(location.search);let events=[],supabaseClient=null,ownerKey=params.get('sync')||localStorage.getItem(STORAGE_OWNER)||createOwnerKey();const el={sidebarToggle:document.querySelector('#sidebarToggle'),navButtons:document.querySelectorAll('[data-view-target]'),form:document.querySelector('#eventForm'),eventId:document.querySelector('#eventId'),title:document.querySelector('#title'),date:document.querySelector('#date'),category:document.querySelector('#category'),note:document.querySelector('#note'),events:document.querySelector('#events'),status:document.querySelector('#status'),supabaseUrl:document.querySelector('#supabaseUrl'),supabaseKey:document.querySelector('#supabaseKey'),saveCloud:document.querySelector('#saveCloud'),syncNow:document.querySelector('#syncNow'),newSpace:document.querySelector('#newSpace'),shareSync:document.querySelector('#shareSync'),shareOutput:document.querySelector('#shareOutput'),shareLink:document.querySelector('#shareLink'),exportJson:document.querySelector('#exportJson'),importJson:document.querySelector('#importJson'),importButton:document.querySelector('#importButton'),saveEvent:document.querySelector('#saveEvent'),resetForm:document.querySelector('#resetForm')};const text={save:'保存',update:'更新',empty:'还没有倒计时，先添加一个重要日期。',localSaved:'已保存到本地。配置云端后可跨设备同步。',cloudSaved:'已同步到云端。',cloudConnected:'已连接云端同步。',configSaved:'云端配置已保存，并已拉取当前同步空间的数据。',shareCopied:'同步链接已显示并复制。手机打开后使用同一 Supabase 配置即可同步。',shareShown:'复制受限，请手动复制页面中显示的同步链接。'};const labels={anniversary:'纪念日',birthday:'生日',exam:'考试',travel:'旅行',work:'工作',custom:'其他'},emojis={anniversary:'💚',birthday:'🎂',exam:'📚',travel:'🚆',work:'💼',custom:'⭐'};
function showView(name){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.querySelector(`#${name}View`).classList.add('active');document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.viewTarget===name))}function dateOnly(value){const[y,m,d]=String(value).split('-').map(Number);return new Date(y,m-1,d)}function daysBetween(targetDate,baseDate=new Date()){const target=dateOnly(targetDate),base=new Date(baseDate.getFullYear(),baseDate.getMonth(),baseDate.getDate());return Math.round((target.getTime()-base.getTime())/DAY_MS)}function describeDateDistance(targetDate){const days=daysBetween(targetDate);if(days>0)return{tone:'future',num:String(days),unit:'天',label:`还有 ${days} 天`};if(days<0)return{tone:'past',num:String(Math.abs(days)),unit:'天',label:`已过去 ${Math.abs(days)} 天`};return{tone:'today',num:'0',unit:'天',label:'就是今天'}}function normalizeEvent(event){const title=String(event?.title||'').trim(),date=String(event?.date||'').trim(),category=String(event?.category||'custom').trim()||'custom',note=String(event?.note||'').trim();if(!title)throw new Error('标题不能为空');if(!date)throw new Error('日期不能为空');if(!/^\d{4}-\d{2}-\d{2}$/.test(date))throw new Error('日期格式必须是 YYYY-MM-DD');return{id:String(event?.id||'').trim(),title,date,category,note}}function sortEvents(items){return[...items].sort((a,b)=>{const dayA=daysBetween(a.date),dayB=daysBetween(b.date);if(dayA>=0&&dayB<0)return-1;if(dayA<0&&dayB>=0)return 1;return Math.abs(dayA)-Math.abs(dayB)})}function serializeEvents(items){return btoa(unescape(encodeURIComponent(JSON.stringify(items.map(normalizeEvent)))))}function deserializeEvents(payload){const parsed=JSON.parse(decodeURIComponent(escape(atob(payload))));if(!Array.isArray(parsed))throw new Error('分享数据格式不正确');return parsed.map(normalizeEvent)}function createOwnerKey(){return globalThis.crypto?.randomUUID?globalThis.crypto.randomUUID():`owner-${Date.now()}-${Math.random().toString(16).slice(2)}`}function createId(){return globalThis.crypto?.randomUUID?globalThis.crypto.randomUUID():`event-${Date.now()}-${Math.random().toString(16).slice(2)}`}function normalizeSupabaseConfig(config){const rawUrl=String(config?.url||'').trim(),key=String(config?.key||'').trim().replace(/\s+/g,'_');let parsed;try{parsed=new URL(rawUrl)}catch{throw new Error('Supabase URL 必须是 https://xxxx.supabase.co')}if(!parsed.hostname.endsWith('.supabase.co'))throw new Error('Supabase URL 必须是 https://xxxx.supabase.co');return{url:`${parsed.protocol}//${parsed.hostname}`,key}}function setStatus(message,tone=''){el.status.textContent=message;el.status.className=`status ${tone}`.trim()}function readConfig(){try{return JSON.parse(localStorage.getItem(STORAGE_CONFIG)||'{}')}catch{return{}}}function writeConfig(config){localStorage.setItem(STORAGE_CONFIG,JSON.stringify(config))}function loadLocal(){try{const local=JSON.parse(localStorage.getItem(STORAGE_EVENTS)||'[]');events=Array.isArray(local)?local.map(normalizeEvent):[]}catch{events=[]}}function saveLocal(){localStorage.setItem(STORAGE_EVENTS,JSON.stringify(events));localStorage.setItem(STORAGE_OWNER,ownerKey)}async function connectSupabase(){const saved=readConfig();if(!saved.url||!saved.key)return false;const config=normalizeSupabaseConfig(saved);el.supabaseUrl.value=config.url;el.supabaseKey.value=config.key;const{createClient}=await import('https://esm.sh/@supabase/supabase-js@2');supabaseClient=createClient(config.url,config.key);return true}async function pullCloud(){if(!supabaseClient)return;const{data,error}=await supabaseClient.from('countdown_events').select('id,title,date,category,note').eq('owner_key',ownerKey).order('date',{ascending:true});if(error)throw error;events=data.map(normalizeEvent);saveLocal()}async function pushCloud(){if(!supabaseClient)return;const rows=events.map(event=>({...event,owner_key:ownerKey}));const{error:deleteError}=await supabaseClient.from('countdown_events').delete().eq('owner_key',ownerKey);if(deleteError)throw deleteError;if(!rows.length)return;const{error:insertError}=await supabaseClient.from('countdown_events').insert(rows);if(insertError)throw insertError}async function persist(){saveLocal();render();if(!supabaseClient){setStatus(text.localSaved,'warn');return}try{await pushCloud();setStatus(text.cloudSaved,'ok')}catch(error){setStatus(`云端同步失败：${error.message}`,'error')}}async function syncCloud(){try{if(!supabaseClient){const connected=await connectSupabase();if(!connected){setStatus('请先在云端同步设置页填写 URL 和 key。','warn');showView('cloud');return}}await pushCloud();await pullCloud();render();setStatus(text.cloudSaved,'ok')}catch(error){setStatus(`同步失败：${error.message}`,'error')}}function render(){const sorted=sortEvents(events);if(!sorted.length){el.events.innerHTML=`<div class="empty">${text.empty}</div>`;return}el.events.innerHTML=sorted.map((event,index)=>{const distance=describeDateDistance(event.date),dark=index%5===1;return`<article class="count-card ${dark?'dark':''}"><div class="card-actions"><button class="mini-btn" type="button" data-edit="${event.id}">编辑</button><button class="mini-btn" type="button" data-delete="${event.id}">删除</button></div><h3>${escapeHtml(event.title)}${distance.tone==='future'?'还有':''}</h3><div class="big-count"><strong>${escapeHtml(distance.num)}</strong><span>${escapeHtml(distance.unit)}</span></div><div class="card-meta"><span>${escapeHtml(labels[event.category]||labels.custom)}</span><span>${escapeHtml(event.date)}</span>${event.note?`<span>${escapeHtml(event.note)}</span>`:''}</div><div class="card-emoji">${emojis[event.category]||emojis.custom}</div></article>`}).join('')}function escapeHtml(value){return String(value).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}async function copyText(text){if(navigator.clipboard?.writeText){try{await navigator.clipboard.writeText(text);return true}catch{}}const area=document.createElement('textarea');area.value=text;area.style.position='fixed';area.style.left='-9999px';document.body.append(area);area.select();const copied=document.execCommand('copy');area.remove();return copied}function resetForm(){el.eventId.value='';el.form.reset();el.category.value='anniversary';el.saveEvent.textContent=text.save}
el.sidebarToggle.addEventListener('click',()=>document.body.classList.toggle('sidebar-collapsed'));el.navButtons.forEach(button=>button.addEventListener('click',()=>showView(button.dataset.viewTarget)));el.form.addEventListener('submit',async event=>{event.preventDefault();try{const normalized=normalizeEvent({id:el.eventId.value||createId(),title:el.title.value,date:el.date.value,category:el.category.value,note:el.note.value});const index=events.findIndex(item=>item.id===normalized.id);if(index>=0)events[index]=normalized;else events.push(normalized);resetForm();await persist()}catch(error){setStatus(error.message,'error')}});el.events.addEventListener('click',async event=>{const editId=event.target.dataset.edit,deleteId=event.target.dataset.delete;if(editId){const item=events.find(entry=>entry.id===editId);if(!item)return;el.eventId.value=item.id;el.title.value=item.title;el.date.value=item.date;el.category.value=item.category;el.note.value=item.note;el.saveEvent.textContent=text.update;showView('home');document.querySelector('#addSection').scrollIntoView({behavior:'smooth',block:'start'})}if(deleteId){events=events.filter(entry=>entry.id!==deleteId);await persist()}});el.saveCloud.addEventListener('click',async()=>{try{const config=normalizeSupabaseConfig({url:el.supabaseUrl.value,key:el.supabaseKey.value});writeConfig(config);el.supabaseUrl.value=config.url;el.supabaseKey.value=config.key;const connected=await connectSupabase();if(!connected){setStatus('请填写 Supabase URL 和 publishable key。','warn');return}await pullCloud();render();setStatus(text.configSaved,'ok')}catch(error){setStatus(`连接失败：${error.message}`,'error')}});el.syncNow.addEventListener('click',syncCloud);el.newSpace.addEventListener('click',()=>{ownerKey=createOwnerKey();localStorage.setItem(STORAGE_OWNER,ownerKey);setStatus('已创建新的同步空间。保存数据后即可生成新链接。','ok')});el.shareSync.addEventListener('click',async()=>{const url=new URL(location.href);url.searchParams.set('sync',ownerKey);if(events.length)url.searchParams.set('data',serializeEvents(events));const link=url.toString();el.shareLink.value=link;el.shareOutput.classList.add('active');el.shareLink.focus();el.shareLink.select();const copied=await copyText(link);setStatus(copied?text.shareCopied:text.shareShown,copied?'ok':'warn')});el.exportJson.addEventListener('click',()=>{const blob=new Blob([JSON.stringify(events,null,2)],{type:'application/json'});const link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download='anniversary-countdown.json';link.click();URL.revokeObjectURL(link.href)});el.importButton.addEventListener('click',()=>el.importJson.click());el.importJson.addEventListener('change',async()=>{const file=el.importJson.files[0];if(!file)return;try{const imported=JSON.parse(await file.text());events=imported.map(item=>normalizeEvent({...item,id:item.id||createId()}));await persist()}catch(error){setStatus(`导入失败：${error.message}`,'error')}finally{el.importJson.value=''}});el.resetForm.addEventListener('click',resetForm);async function init(){localStorage.setItem(STORAGE_OWNER,ownerKey);loadLocal();const sharedData=params.get('data');if(sharedData){try{events=deserializeEvents(sharedData).map(event=>({...event,id:event.id||createId()}));saveLocal()}catch(error){setStatus(`分享数据读取失败：${error.message}`,'error')}}render();try{const connected=await connectSupabase();if(connected){await pullCloud();render();setStatus(text.cloudConnected,'ok')}}catch(error){setStatus(`云端未连接：${error.message}`,'warn')}}init();
</script>
</body>
</html>
